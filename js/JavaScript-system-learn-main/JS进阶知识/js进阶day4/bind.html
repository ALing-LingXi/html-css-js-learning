<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // bind改变this指针指向，与call和apply不同的是它不会调用函数
    //  会返回一个新的函数，里面this永远改变
    const obj ={name:"xxi"}
    function fn(){
      console.log(this)
    }
    const fn1 =fn.bind(obj)
    fn1()
  </script>
</body>
</html>
