<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <ul>
    <li></li>
    <li></li>
    <li></li>
  </ul>
  <script>
    // find every Array from
    // find 查找满足条件的数组
    const arr = [{name:"linxi",age:18},{name:"yueer",age:19}]
    const ts = arr.find(ele=>ele.age>=19)
    console.log(ts)
    // every 所有元素满足条件返回true some是部分
    const js = arr.every(ele=>ele.age>=18)
    console.log(js)
    // Array from 把伪数组变成真数组
    const lis = document.querySelectorAll("ul li")
    const liss = Array.from(lis)
    liss.pop()
    console.log(liss)
  </script>
</body>
</html>
