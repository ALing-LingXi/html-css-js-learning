<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<body>
  <script>
    // 动态参数---伪数组
    function fn(){
      console.log(...arguments)
    }
    fn(1,2,3,4,5)

    // 剩余参数
    function fn1(a,b,...arr){
      console.log(a,b,arr)
      console.log(a,b,...arr)
    }
    fn1(1,2,3,4,5,6)
    const arr2=[1,2,3]
    const arr3 =[4,5,6]
    const arr4 = [...arr2,...arr3]
    console.log(arr4)
  </script>
</body>
</html>
