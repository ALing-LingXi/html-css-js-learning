<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    body{
      background-image: url(./images/desktop_1.jpg) ;
    }
  </style>
</head>
<body>
  <script>
    function random(M,N){
      return Math.floor(Math.random()*(N-M+1))+M
    }
    const rand=random(1,6)
    document.body.style.backgroundImage=`url(./images/desktop_${rand}.jpg)`
  </script>
</body>
</html>
