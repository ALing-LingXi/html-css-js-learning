<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>年会抽奖</title>
  <style>
    .wrapper {
      width: 840px;
      height: 420px;
      background: url(./images/bg01.jpg) no-repeat center / cover;
      padding: 100px 250px;
      box-sizing: border-box;
    }
  </style>
</head>

<body>
  <div class="wrapper">
    <strong>传智教育年会抽奖</strong>
    <h1>一等奖：<span id="one">???</span></h1>
    <h3>二等奖：<span id="two">???</span></h3>
    <h5>三等奖：<span id="three">???</span></h5>
  </div>
  <script>
    const arr = ["林希", "月夜", "自由的天空", "林希-波流卡", "猫染月", "pray"]
    const random1 = Math.floor(Math.random() * arr.length)
    const elem1 = document.querySelector("#one")
    elem1.innerText = arr[random1]
    arr.splice(random1, 1)

    const random2 = Math.floor(Math.random() * arr.length)
    const elem2 = document.querySelector("#two")
    elem2.innerText = arr[random2]
    arr.splice(random2, 1)

    const random3 = Math.floor(Math.random() * arr.length)
    const elem3 = document.querySelector("#three")
    elem3.innerText = arr[random3]
    arr.splice(random3, 1)
  </script>
</body>

</html>
