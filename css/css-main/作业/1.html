<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
.box{
  box-sizing: border-box;
  width: 800px;
  height: 800px;
  border: 1px solid black;
  display: flex;
  /* align-items: center; */
  /* align-items: end; */
  /* justify-content: space-between; */
  /* justify-content: space-around; */
  justify-content: space-evenly;
}
.box div{
  width: 200px;
  height: 200px;
  background-color: pink;
  border: 1px solid black;
}
.box div:nth-child(2){
  align-self: center;
}
  </style>
</head>
<body>
  <div class="box">
    <div>1</div>
    <div>2</div>
    <div>3</div>
  </div>
</body>
</html>
