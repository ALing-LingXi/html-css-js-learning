<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0px;
      margin: 0px;
      box-sizing: border-box;
    }

    body {
      line-height: 1;
    }

    .box {
      width: 395px;
      height: 340px;
      margin: 100px auto;
      /* border: 1px solid black; */
    }

    h1 {
      width: 48px;
      height: 48px;
      background: url("mi-logo.png") #ff4c00 no-repeat;
      margin-left: 189px;
    }

    h2 {
      margin-top: 34px;
      font-size: 30px;
      margin-bottom: 48px;
      margin-left: 125px;
      font-weight: normal;
    }

    input {
      display: block;
      width: 356px;
      height: 48px;
      margin-left: 32px;
      margin-bottom: 15px;
      border: 1px #ccc solid;
    }

    .e3 {
      background-color: #ff4c00;
      color: #fff;
      border: 0px;
      display: block;
      width: 356px;
      height: 48px;
      margin-left: 32px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1></h1>
    <h2>小米账号登录</h2>
    <input type="text" placeholder="邮箱/手机/小米ID" class="e1">
    <input type="password" placeholder="邮箱/手机/小米ID" class="e2">
    <button class="e3">登录</button>
  </div>
</body>

</html>
