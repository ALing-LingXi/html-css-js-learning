<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0px;
      margin: 0px;
      box-sizing: border-box;
    }
    body{
      line-height: 1;
    }

    .box {
      width: 500px;
      height: 400px;
      border: 1px solid #ccc;
      margin: 50px auto;
    }

    .box .hd {
      height: 80px;
      width: 435px;
      font-size: 28px;
      font-weight: bold;
      border-bottom: 1px #ccc solid;
      color: black;
      padding-left: 32px;
      padding-top: 35px;
      margin-left: 30px;
    }

    .box .bd ul {
      list-style: none;
    }

    .box .bd li {
      height: 50px;
      width: 435px;
      font-size: 18px;
      border-bottom: 1px #ccc dashed;
      margin-left: 30px;
      line-height: 50px;
      padding-left: 30px;
      font-size: 18px;
      color: #666;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="hd">
      最新文章/New Articles
    </div>
    <div class="bd">
      <ul>
        <li>开局不利</li>
        <li>昏招频出</li>
        <li>尽显颓势</li>
        <li>败局已定</li>
        <li>发表获奖感言</li>
      </ul>
    </div>
  </div>
</body>

</html>
