<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .box {
      width: 1226px;
      height: 615px;
      border: 1px solid black;
      margin: 100px auto;
      display: flex;
    }

    .box .b1 {
      width: 234px;
      height: 615px;
      background-color: #800080;
    }

    .box .b2 {
      width: 987px;
      height: 615px;
      /* background-color: pink; */
      margin-left: 15px;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-content: space-between;
    }
    .box .b2 div{
      width: 234px;
      height: 300px;
      background-color: #87ceeb;
      border: 1px solid black;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="b1"></div>
    <div class="b2">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>
</body>

</html>
