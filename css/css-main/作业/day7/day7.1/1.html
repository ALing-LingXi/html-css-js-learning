<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    img {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 400px;
      height: auto;
      transform: translate(-50%, -50%);
    }

    span {
      position: fixed;
      top: 0px;
      right: 50%;
    }

    .box1 {
      width: 200px;
      height: 200px;
      background-color: pink;
      position: absolute;
      z-index: 3;
    }

    .box2 {
      width: 200px;
      height: 200px;
      background-color: yellowgreen;
      position: absolute;
      top: 100px;
    }
  </style>
</head>

<body>
  <img src="./12.png" alt="">
  <span>我爱你</span>
  <div class="box1"></div>
  <div class="box2"></div>
</body>

</html>
