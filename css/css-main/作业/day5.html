<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      padding: 0px;
      margin: 0px;
      box-sizing: border-box;
    }
    .hd{
      height: 42px;
      border-top: 2px solid #ff8500;
      border-bottom: 1px solid #edeef0;
    }
    .hd li{
      display: inline-block;
      height: 42px;
    }
    .hd ul{
     list-style:none ;
    }
    .hd li a{
      text-decoration: none;
      font-size: 12px;
      color: #4c4c4c;
      margin: 37px;
      line-height: 42px;
    }
    .hd li a:hover{
      color: #ff8500;
    }
    .hd li:hover{
      background-color: #edeef0;
    }
  </style>
</head>
<body>
  <div class="hd">
    <ul>
      <li><a href="">新浪导航</a></li>
      <li><a href="">新浪导航</a></li>
      <li><a href="">新浪导航</a></li>
      <li><a href="">新浪导航</a></li>
    </ul>
  </div>
</body>
</html>
