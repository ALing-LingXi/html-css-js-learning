<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      padding: 0px;
      margin: 0px;
      box-sizing: border-box;
    }
    .box{
      height: 42px;
      border-top: 2px solid  #ff8500;
      border-bottom: 1px solid #edeef0;
    }
    .box a{
      display: inline-block;
      width: 80px;
      height: 42px;
      text-decoration: none;
      color:#4c4c4c ;
      text-align: center;
      line-height: 42px;
      font-size: 12px;
    } 
    .box a:hover{
      background-color: #edeef0;
      color: #ff8400;
    }
  </style>
</head>
<body>
  <div class="box">
    <a href="">新浪导航</a>
    <a href="">新浪导航</a>
    <a href="">新浪导航</a>
    <a href="">新浪导航</a>
  </div>
</body>
</html>
