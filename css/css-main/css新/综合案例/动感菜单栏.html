<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    img {
      display: block;
    }

    .bs {
      width: 300px;
      height: 100px;
      position: relative;
      top: 50px;
      left: 40px;
      background-color: yellowgreen;
    }

    .nav {
      width: 100%;
      height: 100%;
      background-color: pink;
      font-size: 32px;
      text-align: center;
      line-height: 100px;
    }

    ul {
      list-style: none;
      /* width: 100%; */
      /* height: 100%; */
    }

    ul li {
      width: 100%;
      height: 100%;
      background-color: tomato;
      font-size: 32px;
      text-align: center;
      line-height: 100px;
      /* translate: -100%; */
      transform: translate(-100%);
      /* opacity: 0; */
    }

     ul:hover li{
      animation: move 0.5s calc(var(--i) * 0.1s) forwards;
      opacity: 1;
    }

    @keyframes move {
      100% {
        transform: translate(0%);
      }
    }
  </style>
</head>

<body>
  <div class="bs">
    <div class="nav">菜单</div>
    <ul>
      <li style="--i:1;">任务1</li>
      <li style="--i:2;">任务2</li>
      <li style="--i:3;">任务3</li>
      <li style="--i:4;">任务4</li>
    </ul>
  </div>
</body>

</html>
