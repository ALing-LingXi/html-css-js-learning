<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    :root {
      --cardheight: 40vw;
      --cardgap: 4vw;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    img {
      display: block;
    }

    body {
      background-color: #3a1d2b;
    }

    .head {
      width: 100vw;
      height: 100vh;
      display: grid;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    h1 {
      font-size: 4.5vw;
      color: white;
      margin-bottom: 1vw;
    }

    p {
      font-size: 2vw;
      color: white;
    }

    .main {
      width: 80vw;
      height: 40vw;
      margin: 0px auto;
    }

    .main ul {
      width: 100%;
      /* height: 100%; */
      /* text-align: center; */
      /* background-color: yellow; */
    }

    .main li {
      width: 80vw;
      height: 40vw;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: sticky;
      top: 0;
      animation: move 1s forwards ;
      animation-timeline: view();
    }

    .main figure {
      overflow: hidden;
    }

    .main img {
      width: 100%;
      height: 100%;
      object-position: center;
      object-fit: cover;
    }

    .left {
      background-color: #fff;
      text-align: center;
      line-height: var(--cardheight);
      font-size: 8vw;
    }

    ul li:last-child img {
      object-position: 100%;
      transform: scale(1.5);
    }
    @keyframes move {
      0%{
        transform: scale(0.8);
      }
      100%{
        transform: scale(1);
      }
    }
    .content{
      width: var(--cardheight);
      height: 60vh;
      text-align: center;
      font-size: 42px;
      line-height: 60vh;
      color: white;
    }
  </style>
</head>

<body>
  <div class="head">
    <div class="bs">
      <h1>GALGAME游戏CG总览</h1>
      <p>天使嚣嚣REBOOT启动</p>
    </div>
  </div>

  <!-- 卡片位置 -->
  <div class="main">
    <ul>
      <li>
        <div class="left">惠凪</div>
        <figure><img src="img/6 copy.jpg" alt=""></figure>
      </li>
      <li>
        <div class="left">希</div>
        <figure><img src="img/4 copy.jpg" alt=""></figure>
      </li>
      <li>
        <div class="left">隐杏珠</div>
        <figure><img src="img/7 copy.jpg" alt=""></figure>
      </li>
      <li>
        <div class="left">阿拉蒂娅</div>
        <figure><img src="img/1 copy.jpg" alt=""></figure>
      </li>
    </ul>

    <div class="content">
      来骗来偷袭，有一个不是GALGAME
    </div>
  </div>
</body>

</html>
