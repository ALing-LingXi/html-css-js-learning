<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    .box {
      position: relative;
      width: 300px;
      height: 400px;
      border: 2px solid black;
      margin: 100px auto;
      transition: all 1s;
      perspective: 1000px;
      transform-style: preserve-3d;
    }

    .bs {
      position: absolute;
      left: 0;
      top: 0;
      margin: 0px auto;
      margin-bottom: 0px;
      width: 300px;
      height: 400px;
      background-color: pink;
      z-index: 1;
      backface-visibility: hidden;
    }

    img {
      display: block;
      margin-left: 75px;
      width: 150px;
      border-radius: 50%;
      object-fit: cover;
      object-position: center;
    }

    .txt {
      width: 200px;
      height: 200px;
      margin-top: 20px;
      background-color: white;
      margin-left: 50px;
      box-shadow: 0px 0px 5px rgba(0, 0, 0, 0.3);
      text-align: center;
      color: red;
      line-height: 100px;
    }

    .bs2 {
      position: absolute;
      left: 0;
      top: 0;
      margin: 0px auto;
      width: 300px;
      height: 400px;
      background-color: pink;
      transform: rotateY(-180deg);
      backface-visibility: hidden;

    }

    .box:hover {
      transform: rotateY(180deg);
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="bs">
      <div class="img">
        <img src="./img/Image_1987543278074310.png" alt="">
      </div>
      <div class="txt">
        卡朵莲
      </div>
    </div>
    <div class="bs2">
      <div class="img">
        <img src="./img/6.jpg" alt="">
      </div>
      <div class="txt">
        第一歌姬
      </div>
    </div>
  </div>
</body>

</html>
