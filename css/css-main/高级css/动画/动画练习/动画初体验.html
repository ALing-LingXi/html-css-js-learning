<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .bos{
      width: 200px;
      height: 200px;
      margin: 0 auto;
      background-color: pink;
      animation: change 1s;
    }
    /* @keyframes change {
      from{
        width: 200px;
      }
      to{
        width: 400px;
      }
    } */
     @keyframes change {
      0%{
        width: 200px;
      }
      50%{
        width: 400px;
      }
      100%{
        height: 400px;
        width: 800px;
        background-color: yellowgreen;
      }
     }
  </style>
</head>
<body>
  <div class="bos">

  </div>
</body>
</html>
