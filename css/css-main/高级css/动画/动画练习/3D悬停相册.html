<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #1a252c;
    }

    .bs {
      display: flex;
      margin: 100px auto;
      width: 400px;
      height: 300px;
      /* border: 2px solid red; */
      text-align: center;
      justify-content: center;
      -webkit-box-reflect: below 1px linear-gradient(transparent, #0002);
      perspective: 1000px;
    }

    .bs img {
      position: relative;
      width: 100px;
      display: block;
      object-fit: cover;
      object-position: center;
      transition: all 0.2s;
    }

    .bs img:first-child {
      object-position: 75%;
    }

    .bs img:hover {
      transform: scale(1.2);
      z-index: 1;
      margin: 0px 20px;
    }

    .bs:hover img:not(:hover) {
      transform: scale(0.9) rotateY(45deg);
    }

    .bs:hover img:hover~img {
      transform: scale(0.9) rotateY(-45deg);
    }
  </style>
</head>

<body>
  <div class="bs">
    <img src="./img/1.jpg" alt="" class="item">
    <img src="./img/7.jpg" alt="" class="item">
    <img src="./img/6.jpg" alt="" class="item">
    <img src="./img/4.jpg" alt="" class="item">
    <img src="./img/5.png" alt="" class="item">
  </div>
</body>

</html>
