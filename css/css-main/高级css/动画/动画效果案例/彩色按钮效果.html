<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    a {
      position: relative;
      display: block;
      padding: 4px;
      background-color: pink;
      text-decoration: none;
      width: 200px;
      height: 100px;
      margin: 100px;
      text-align: center;
      line-height: 100px;
      overflow: hidden;
    }

    a::before {
      position: absolute;
      top: 0;
      left: 0;
      content: '';
      width: 200%;
      height: 100%;
      background: linear-gradient(115deg,
          #4fcf70, #6fd180, #8ad190,
          #fad648, #fbe07d, #fce9a3,
          #a767e5, #b885ea, #caa3ef,
          #12bcfe, #41c9fe, #70d7fe,
          #c0d8ff, #d0e2ff, #e0ecff);
      background-size: 50% 100%;
      animation: move 1s linear infinite;
    }

    span {
      display: block;
      position: relative;
      width: 100%;
      height: 100%;
      background-color: black;
      color: white;
      text-align: center;
      line-height: 92px;
    }

    @keyframes move {
      100% {
        transform: translate(-50%);
      }
    }
  </style>
</head>

<body>
  <a href="">
    <span>点击下载</span>
  </a>

</body>

</html>
