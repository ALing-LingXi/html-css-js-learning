<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      background-color: #1e1f26;
    }

    .bs {
      display: flex;
      position: relative;
      margin: 100px auto;
      width: 200px;
      height: 100px;
      color: white;
      line-height: 100px;
      text-align: center;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      border-radius: 10px;
    }

    .bs::before {
      position: absolute;
      content: "";
      width: 500px;
      height: 500px;
      background-image: conic-gradient(transparent, transparent, transparent, #00ccff);
      animation: rotate 1s linear infinite;
      z-index: -1;
    }
    .bs::after{
      position: absolute;
      content: "";
      background-color: black;
      inset: 3px;
      z-index: -1;
    }
    @keyframes rotate {
      100%{
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="bs">
    流光按钮
  </div>
</body>

</html>
