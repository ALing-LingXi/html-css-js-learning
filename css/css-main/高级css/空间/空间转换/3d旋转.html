<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
     div{
      margin: 100px auto;
      width: 1000px;
      perspective: 1000px;
     }
    div,img{
      height: 500px;
      transition: all 1s;
    }
    img:hover{
      transform: rotateX(90deg);
      transform: rotateY(90deg);
      transform: rotateZ(90deg);
    }
  </style>
</head>
<body>
  <div>
    <img src="./ChatGPT Image 2026年1月10日 11_36_23.png" alt="">
  </div>
</body>
</html>
