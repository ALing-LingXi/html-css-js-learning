<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
    }

    .nav {
      margin: 0px auto;
      width: 1000px;
      height: 1000px;
    }

    ul {
      list-style: none;
      display: flex;
      margin-left: 100px;

    }

    a {
      display: block;
      text-decoration: none;
      text-align: center;
      line-height: 100px;
      color: white;
    }

    ul li {
      margin-top: 100px;
      width: 200px;
      height: 100px;
      position: relative;
      transform-style: preserve-3d;
      transition: all 1s;
        /* transform: rotateX(-20deg) rotateY(30deg); */

    }

    ul li a:first-child {
      position: absolute;
      top: 0;
      left: 0;
      width: 200px;
      height: 100px;
      background-color: greenyellow;
      transform: translateZ(50px);
    }

    ul li a:last-child {
      position: absolute;
      top: 0;
      left: 0;
      width: 200px;
      height: 100px;
      background-color: orange;
      transform: rotateX(90deg) translateZ(50px) ;
    }

    ul li:hover {
      transform: rotateX(-90deg);
    }
  </style>
</head>

<body>
  <div class="nav">
    <ul>
      <li>
        <a href="">首页</a>
        <a href="">index</a>
      </li>
      <li>
        <a href="">首页</a>
        <a href="">index</a>
      </li>
      <li>
        <a href="">首页</a>
        <a href="">index</a>
      </li>
    </ul>
  </div>
</body>

</html>
