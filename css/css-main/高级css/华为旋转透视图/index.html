<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    img {
      display: block;
    }

    body {
      background-color: #f5f5f5;
    }

    .bs {
      position: relative;
      width: 400px;
      height: 400px;
      margin: 100px auto;
    }

    .bs img {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
    }

    .bs img:first-child {
      border-radius: 50%;
      animation: scale 1s infinite linear;
      
    }

    .bs img:last-child {
      transform: scale(1.1);
      animation: rotate 1s infinite linear;
    }

    @keyframes rotate {
      100% {
        transform: scale(1.1) rotate(1turn);
      }
    }

    @keyframes scale {
      100% {
        transform: scale(1.1);
      }
    }
  </style>
</head>
<div class="bs">
  <img src="./bgimg.png" alt="">
  <img src="./rotate.png" alt="">
</div>

<body>

</body>

</html>
