<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    html,body{
      width: 100%;
      height: 100%;
    }

    img{
      display: block;
    }
    ul{
      list-style: none;
      display: flex;
      width: 1200px;
      margin: 0px auto;
      justify-content: center;
      /* background-color: yellowgreen; */
    }
    ul li{
      width: 58px;
      height: 58px;
      margin-right: 100px;
      background-color: pink;
      background: url("./sprite.png") 0px calc(var(--i) * -58px);
    }
  </style>
</head>

<body>
<ul>
  <li style="--i:0;"></li>
  <li style="--i:1;"></li>
  <li style="--i:2;"></li>
  <li style="--i:3;"></li>
</ul>
</body>
</html>
