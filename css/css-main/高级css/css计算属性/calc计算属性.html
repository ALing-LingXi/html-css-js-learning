<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }

    html,body{
      width: 100%;
      height: 100%;
    }

    img{
      display: block;
    }
    .bs{
      width: 1200px;
      height: 600px;
      margin: 100px auto;
    }
    ul{
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }
    .bs li{
      width: calc(33.33% - var(--gap));
      height: 100px;
      background-color: pink;
    }
    :root{
      --gap:20px;
    }
  </style>
</head>

<body>
<div class="bs">
  <ul>
    <li>a</li>
    <li>a</li>
    <li>a</li>
    <li>a</li>
    <li>a</li>
    <li>a</li>
  </ul>
</div>
</body>
</html>
