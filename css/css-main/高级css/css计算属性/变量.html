<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    :root{
      --color:red;
    }
    html,body{
      width: 100%;
      height: 100%;
    }

    img{
      display: block;
    }
    .nav{
      --fs:20px;
    }
    .nav ul li:hover{
      color: var(--color);
      font-size: var(--fs);
    }
  </style>
</head>

<body>
  <div class="nav">
    <ul>
      <li>1</li>
      <li>2</li>
      <li>3</li>
      <li>4</li>
    </ul>
  </div>
</body>
</html>
