<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    .bs {
      width: 800px;
      height: 800px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 100px 100px 100px;
      grid-template-rows: 100px 100px 100px;
      border: 1px solid red;
      background-color: pink;
      justify-content: space-between;
      align-content: space-between;
      margin-bottom: 100px;
    }

    .ts {
      background-color: yellowgreen;
    }

    .bs2 {
      display: grid;
      grid-template-columns: 130px 130px 130px 130px 130px 130px;
      
      margin: 0px auto;
    }

    .td {
      height: 160px;
      margin: 2px;
      background-color: tomato;
    }
  </style>
</head>

<body>
  <div class="bs">
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
  </div>
  <div class="bs2">
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
    <div class="td"></div>
  </div>
</body>

</html>
