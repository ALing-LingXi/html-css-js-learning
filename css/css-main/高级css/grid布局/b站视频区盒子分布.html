<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    .bs{
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(5,1fr);
      gap: 16px;
    }
    .ts{
      width: 100%;
      height: 120px;
      background-color: pink;
    }
    .ts:first-child{
      grid-column: 1/2 span;
      grid-row: 1/2 span; 
      height: auto;
    }
  </style>
</head>
<body>
  <div class="bs">
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
  </div>
</body>
</html>
