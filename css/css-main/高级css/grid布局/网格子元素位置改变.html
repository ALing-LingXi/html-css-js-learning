<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      padding: 0;
      margin: 0;
      box-sizing: border-box;
    }
    .bs{
      max-width: 1200px;
      height: 900px;
      margin: 100px auto;
      display: grid;
      grid-template-columns: repeat(3,1fr);
      grid-template-rows: repeat(3,1fr);
      background-color: yellowgreen;
      justify-items: center;
      align-items: center;
    }
    .ts{
      width: 100px;
      height: 100px;
      background-color: pink;
    }
  </style>
</head>
<body>
  <div class="bs">
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
    <div class="ts"></div>
  </div>
</body>
</html>
