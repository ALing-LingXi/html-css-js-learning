<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    *{
      box-sizing: border-box;
    }
    img{
      width: 200px;
      height: auto;
      opacity: 50%;
    }
    img:hover{
      opacity: 100%;
    }
    .e2{
      background: url("./卡朵莲.png") no-repeat;
    }
    .contain{
      display: flex;
      width: 400px;
      height: 200px;
      align-items: center;
      justify-content: center;
      background-color: turquoise;
      opacity: 0.3;
      border: 2px solid black;
    }
  </style>
</head>

<body>
  <div class="e1">
    <img src="./卡朵莲.png" alt="">
  </div>
  <div class="e2">
    <div class="contain">
      <p>我稀饭你</p>
    </div>
  </div>

</html>
