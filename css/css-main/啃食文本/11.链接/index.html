<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<style>
  a:link{
    color: red;
    text-decoration: none;
    /* 未访问 */
  }
  a:visited{
    color: aqua;
    text-decoration: none;
    background-color: yellowgreen;

  }
  a:hover{
    color: green;
    text-decoration: underline;
    font-size: 150%;
    /* 悬停 */
  }
  a:active{
    color: white;
    text-decoration: underline;
    text-shadow:2px 2px 4px black, blue 0px 0px 25px,darkblue 0px 0px 5px ;
  }
</style>
<body>
  <a href="#">你说的对，这就是前端</a>
</body>
</html>
