<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    table,th,td{
      border: 1px solid black;
      /* text-align: center;  */
     /* vertical-align: top; */
      text-align: left;
      padding: 15px;
    }
    table{
      width: 100%;
      /* width: 50%; */
      border-collapse: collapse;
    }
    th{
      height: 70px;
      background-color: aqua;
      color: blueviolet;
    }
    th,td{
        border-bottom: 3px black dashed;
    }
    tr:hover{
      background-color: tomato;
    }
    tr:nth-child(even){
      background-color: #f2f2f2;
    }
  </style>
</head>
<body>
  <table>
    <tr>
      <th>姓</th>
      <th>名</th>
    </tr>
    <tr>
      <td>林</td>
      <td>希</td>
    </tr>
    <tr>
      <td>月</td>
      <td>夜</td>
    </tr>
    <tr>
      <td>5418</td>
      <td>ly</td>
    </tr>
    <tr>
      <td>林</td>
      <td>希尔</td>
    </tr>
  </table>
</body>
</html>
