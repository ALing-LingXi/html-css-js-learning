<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .bs {
      max-width: 1500px;
      display: grid;
      grid-template-columns: repeat(5,1fr);
      grid-template-rows: repeat(3,1fr);
      gap: 10px;
    }

    .item {
      background-color: pink;
      height: 200px;
    }
    .item:nth-child(1){
      height: 100%;
      grid-row:1/3;
      grid-column: 1/3;
    }
  </style>
</head>

<body>
  <div class="bs">
    <div class="item">这是第1个项目</div>
    <div class="item">这是第2个项目</div>
    <div class="item">这是第3个项目</div>
    <div class="item">这是第4个项目</div>
    <div class="item">这是第5个项目</div>
    <div class="item">这是第6个项目</div>
    <div class="item">这是第7个项目</div>
    <div class="item">这是第8个项目</div>
    <div class="item">这是第9个项目</div>
    <div class="item">这是第10个项目</div>
    <div class="item">这是第11个项目</div>
    <div class="item">这是第12个项目</div>

  </div>
</body>

</html>
