<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <style>
    .bs{
      max-width: 1760px;
      height: 900px;
      margin: 100px auto;
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 10px;
    }
    .item img{
      width: 100%;
      display: block;
      height: 100%;
      object-position: center;
      object-fit: cover;
    }
    .item:nth-child(1){
      grid-column: 1/2;
      grid-row: 1/3;
      background-color: yellowgreen;
    }
    .item:nth-child(4){
      grid-column: 2/4;
      grid-row: 2/3;
      background-color: pink;
    }
  </style>
</head>
<body>
  <div class="bs">
    <div class="item"><img src="./img/tree1.jpg" alt=""></div>
    <div class="item"><img src="./img/tree2.jpg" alt=""></div>
    <div class="item"><img src="./img/tree4.jpg" alt=""></div>
    <div class="item"><img src="./img/tree3.jpg" alt=""></div>
  </div>
</body>
</html>
