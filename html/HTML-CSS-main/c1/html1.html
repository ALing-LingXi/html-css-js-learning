    <h2 class="article_title">HTML5 语义化标签</h2>
    <p class="article_content">在前端语义化编程中，使用具有明确含义和目的的 HTML 标签来描述页面的结构和内容。比如，使用 header 标签来表示页面的页眉，使用 nav 标签来表示页面的导航菜单，使用
      article 标签来表示文章内容等。这样，代码就具有了更好的可读性和可维护性，而且能够为搜索引擎提供更多的信息，从而提高网站的排名和曝光度。</p>
